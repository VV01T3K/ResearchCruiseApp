name: Build images & deploy to Komodo staging

on:
  push:
    branches: [staging]
    paths-ignore: ["docs/**", "**.md", ".gitignore"]
  pull_request:
    branches: [staging]
    paths-ignore: ["docs/**", "**.md", ".gitignore"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.component }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - component: frontend
            context: .
            dockerfile: frontend/Dockerfile
          - component: backend
            context: backend
            dockerfile: backend/Dockerfile

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.component }}
          tags: type=raw,value=staging

      - name: Prepare build args
        id: buildargs
        env:
          SENTRY_DSN_FRONTEND: ${{ secrets.SENTRY_DSN_FRONTEND }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT_FRONTEND: ${{ secrets.SENTRY_PROJECT_FRONTEND }}
          SENTRY_PROJECT_BACKEND: ${{ secrets.SENTRY_PROJECT_BACKEND }}
        run: |
          if [ "${{ matrix.component }}" = "frontend" ]; then
            {
              echo "args<<EOF"
              echo "APP_ENVIRONMENT=staging"
              echo "SENTRY_DSN=${SENTRY_DSN_FRONTEND}"
              echo "SENTRY_ENVIRONMENT=staging"
              echo "SENTRY_RELEASE=${{ github.sha }}"
              echo "SENTRY_TRACES_SAMPLE_RATE=0.2"
              echo "SENTRY_ORG=${SENTRY_ORG}"
              echo "SENTRY_PROJECT_FRONTEND=${SENTRY_PROJECT_FRONTEND}"
              echo "GITHUB_SHA=${{ github.sha }}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "args<<EOF"
              echo "SENTRY_ORG=${SENTRY_ORG}"
              echo "SENTRY_PROJECT_BACKEND=${SENTRY_PROJECT_BACKEND}"
              echo "SENTRY_RELEASE=research-cruise-app-backend@${{ github.sha }}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ steps.buildargs.outputs.args }}
          secrets: |
            sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,scope=${{ matrix.component }},mode=max

  trigger-komodo:
    name: Trigger Komodo webhook
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v6

      - name: Trigger Komodo webhook
        env:
          KOMODO_WEBHOOK_URL: https://komodo_wb.wojtecs.com/listener/github/procedure/695bdc102652deb41b6ef3ec/__ANY__
          KOMODO_WEBHOOK_SECRET: ${{ secrets.KOMODO_WEBHOOK_SECRET }}
          CLOUDFLARE_WEBHOOK_SECRET: ${{ secrets.CLOUDFLARE_WEBHOOK_SECRET }}
        run: bash scripts/trigger-komodo-webhook.sh
