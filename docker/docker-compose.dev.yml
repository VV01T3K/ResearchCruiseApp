include:
  - docker-compose.infra.yml

services:
  backend:
    container_name: researchcruiseapp-backend
    build:
      context: ../backend
    environment:
      - Database__SeedAutomatically=true
      - Database__MigrateAutomatically=true
      - Database__LogUserPasswordsWhenSeeding=true
      - ConnectionStrings__Database=Server=db,1433;Database=ResearchCruiseApp;User Id=sa;Password=p@ssw0rd;Encrypt=False
      - FrontendUrl=http://localhost:8080
      - Sentry__Dsn=${SENTRY_DSN_BACKEND:-${SENTRY_DSN:-}}
      - Sentry__Environment=${SENTRY_ENVIRONMENT:-local}
      - Sentry__TracesSampleRate=${SENTRY_TRACES_SAMPLE_RATE:-1}
    ports:
      - 3000:8080
    depends_on:
      db:
        condition: service_healthy
  frontend:
    container_name: researchcruiseapp-frontend
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    environment:
      - SENTRY_DSN=${SENTRY_DSN_FRONTEND:-${SENTRY_DSN:-}}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-}
    ports:
      - 8080:8080
    depends_on:
      backend:
        condition: service_healthy
