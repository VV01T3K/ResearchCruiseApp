[env]
CONVEX_DISABLE_TELEMETRY = "1"
TURBO_TELEMETRY_DISABLED = "1"
DOTNET_CLI_TELEMETRY_OPTOUT = "1"
DO_NOT_TRACK = "1"

[tools]
bun = "latest"
pnpm = "latest"
dotnet = "10.0"

[hooks]
postinstall = '''
(cd frontend && test -d node_modules || vp install)
  if [ ! -f .mise-setup-done ]; then
    (cd backend && dotnet restore && dotnet tool restore)
    echo 'mise setup complete' > .mise-setup-done
  fi
'''
[settings]
experimental = true

[settings.npm]
package_manager = "bun"
